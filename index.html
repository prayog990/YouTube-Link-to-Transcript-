<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guru Siyag Player - v1.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --primary: #ff6b00;
            --bg: #0a0a0a;
            --card: #161618;
            --text: #ffffff;
            --text-dim: #909090;
            --glass: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mukta', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; border-bottom: 1px solid var(--glass);
        }
        .app-title { font-size: 1.2rem; font-weight: 700; color: var(--primary); }

        .tabs-container { margin-top: 70px; padding: 10px; display: flex; gap: 10px; overflow-x: auto; }
        .tab { padding: 6px 18px; background: var(--card); border-radius: 50px; font-size: 0.9rem; border: 1px solid var(--glass); white-space: nowrap; }
        .tab.active { background: var(--primary); color: #fff; }

        #video-list { padding: 15px; padding-bottom: 100px; }
        .v-card {
            display: flex; background: var(--card); border-radius: 12px; margin-bottom: 12px;
            padding: 8px; gap: 10px; border: 1px solid var(--glass); cursor: pointer;
        }
        .v-thumb { width: 120px; height: 75px; border-radius: 8px; overflow: hidden; flex-shrink: 0; position: relative; }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .v-info h3 { font-size: 0.95rem; margin-bottom: 4px; color: #f0f0f0; }
        .v-meta { display: flex; gap: 10px; font-size: 0.7rem; color: var(--text-dim); }

        /* --- Player Screen --- */
        #player-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 3000;
            display: none; flex-direction: column; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .player-header { height: 55px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--glass); }
        
        /* Video Container & Iframe */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        #yt-player { width: 100%; height: 100%; pointer-events: auto; }

        /* Custom Controls Overlay (Sketch ke mutabik) */
        .custom-controls {
            background: #1a1a1c; padding: 12px 15px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--glass);
        }
        .ctrl-group { display: flex; align-items: center; gap: 15px; }
        .ctrl-btn { font-size: 1.1rem; color: #fff; cursor: pointer; transition: 0.2s; }
        .ctrl-btn:active { color: var(--primary); transform: scale(0.9); }
        
        .speed-box { display: flex; align-items: center; background: #2a2a2c; border-radius: 5px; padding: 2px 8px; gap: 10px; font-weight: 600; font-size: 0.85rem; }
        .speed-btn { font-size: 1.2rem; cursor: pointer; color: var(--primary); }

        .player-details { padding: 20px; flex-grow: 1; }
        .player-details h2 { font-size: 1.2rem; color: var(--primary); margin-bottom: 8px; }
        
        .back-nav-btn { 
            margin: 15px; padding: 12px; background: var(--primary); border-radius: 12px;
            text-align: center; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(255,107,0,0.3);
        }

        /* Sidebar & Admin */
        #sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #151517; z-index: 2001; transition: 0.3s; padding: 20px; }
        #sidebar.active { right: 0; box-shadow: -5px 0 20px rgba(0,0,0,0.5); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; }
        .admin-form { display: none; margin-top: 15px; background: var(--glass); padding: 10px; border-radius: 8px; }
        .admin-form input { width: 100%; padding: 10px; margin-bottom: 8px; background: #222; border: 1px solid #333; color: #fff; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleMenu()"></div>

    <header>
        <div class="app-title">GURU SIYAG <span style="font-size: 0.7rem; color: var(--text-dim); vertical-align: middle; margin-left: 5px; font-weight: 400; background: var(--glass); padding: 2px 6px; border-radius: 4px;">v1.2</span></div>
        <div style="display: flex; gap: 15px;">
            <i class="fas fa-sort-amount-down" onclick="sortVideos()" style="color:var(--text-dim); font-size:1.2rem;"></i>
            <i class="fas fa-bars" onclick="toggleMenu()" style="color:var(--text-dim); font-size:1.2rem;"></i>
        </div>
    </header>

    <div class="tabs-container">
        <div class="tab active">प्रवचन</div>
        <div class="tab">e-Books</div>
        <div class="tab">More</div>
    </div>

    <div id="video-list"></div>

    <aside id="sidebar">
        <h3>Menu</h3><br>
        <div onclick="showAdmin()" style="cursor:pointer; color:var(--primary);"><i class="fas fa-plus-circle"></i> Add New Video</div>
        <div class="admin-form" id="admin-form">
            <input type="text" id="v-url" placeholder="YouTube Link">
            <input type="text" id="v-title" placeholder="Video Title">
            <input type="text" id="v-date" placeholder="Date">
            <input type="text" id="v-loc" placeholder="Location">
            <button onclick="addVideo()" style="width:100%; padding:10px; background:green; color:#fff; border:none; border-radius:5px;">Save</button>
        </div>
    </aside>

    <!-- Full Player Screen -->
    <div id="player-screen">
        <div class="player-header">
            <i class="fas fa-chevron-left" onclick="closePlayer()" style="font-size: 1.2rem; margin-right: 15px;"></i>
            <span style="font-weight: 600;">Guru Siyag Speech</span>
        </div>
        
        <div class="video-container">
            <div id="yt-player"></div>
        </div>

        <!-- Sketch based Custom Controls -->
        <div class="custom-controls">
            <div class="ctrl-group">
                <i class="fas fa-volume-up ctrl-btn" id="mute-icon" onclick="toggleMute()"></i>
                <i class="fas fa-play ctrl-btn" id="play-pause-icon" onclick="togglePlay()"></i>
            </div>
            
            <div class="speed-box">
                <span class="speed-btn" onclick="changeSpeed(-0.25)">−</span>
                <span id="speed-val">1.0x</span>
                <span class="speed-btn" onclick="changeSpeed(0.25)">+</span>
            </div>

            <div class="ctrl-group">
                <i class="fas fa-closed-captioning ctrl-btn" style="color: #555;"></i>
                <i class="fas fa-expand ctrl-btn" onclick="toggleFullScreen()"></i>
            </div>
        </div>

        <div class="player-details">
            <h2 id="p-title">Title Here</h2>
            <p id="p-meta" style="color:var(--text-dim); font-size:0.85rem;"></p>
            <div style="margin-top:15px; color:#ccc; font-size:0.9rem; line-height:1.6;">
                जय श्री गुरुदेव! यह वीडियो केवल आध्यात्मिक मार्गदर्शन के लिए है।
            </div>
        </div>
        <div class="back-nav-btn" onclick="closePlayer()">BACK TO LIST</div>
    </div>

    <script>
        let player;
        let videoData = JSON.parse(localStorage.getItem('guru_siyag_vids')) || [];
        let currentPlaybackRate = 1.0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            const over = document.querySelector('.overlay');
            over.style.display = (over.style.display === 'block') ? 'none' : 'block';
        }

        function showAdmin() {
            const form = document.getElementById('admin-form');
            form.style.display = (form.style.display === 'block') ? 'none' : 'block';
        }

        function extractID(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            return (match && match[1]) ? match[1] : null;
        }

        function addVideo() {
            const url = document.getElementById('v-url').value;
            const title = document.getElementById('v-title').value;
            const id = extractID(url);
            if(!id || !title) return alert("Details bhariye!");
            const newVid = { id, title, date: document.getElementById('v-date').value, loc: document.getElementById('v-loc').value };
            videoData.unshift(newVid);
            localStorage.setItem('guru_siyag_vids', JSON.stringify(videoData));
            location.reload();
        }

        function renderList() {
            const list = document.getElementById('video-list');
            list.innerHTML = videoData.map((v, i) => `
                <div class="v-card" onclick="openVideo(${i})">
                    <div class="v-thumb">
                        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
                        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.2); color:white; font-size:1.2rem;"><i class="fas fa-play-circle"></i></div>
                    </div>
                    <div class="v-info">
                        <h3>${v.title}</h3>
                        <div class="v-meta"><span>${v.date}</span><span>${v.loc}</span></div>
                    </div>
                </div>
            `).join('');
        }

        function openVideo(index) {
            const v = videoData[index];
            document.getElementById('p-title').innerText = v.title;
            document.getElementById('p-meta').innerText = `${v.date} | ${v.loc}`;
            document.getElementById('player-screen').style.display = 'flex';
            
            if (player) {
                player.loadVideoById(v.id);
            } else {
                player = new YT.Player('yt-player', {
                    videoId: v.id,
                    playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                    events: { 'onStateChange': onPlayerStateChange }
                });
            }
        }

        function onPlayerStateChange(event) {
            const icon = document.getElementById('play-pause-icon');
            if (event.data == YT.PlayerState.PLAYING) {
                icon.className = "fas fa-pause ctrl-btn";
            } else {
                icon.className = "fas fa-play ctrl-btn";
            }
        }

        function togglePlay() {
            const state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) player.pauseVideo();
            else player.playVideo();
        }

        function toggleMute() {
            const icon = document.getElementById('mute-icon');
            if (player.isMuted()) {
                player.unMute();
                icon.className = "fas fa-volume-up ctrl-btn";
            } else {
                player.mute();
                icon.className = "fas fa-volume-mute ctrl-btn";
            }
        }

        function changeSpeed(delta) {
            currentPlaybackRate = Math.max(0.5, Math.min(2.0, currentPlaybackRate + delta));
            player.setPlaybackRate(currentPlaybackRate);
            document.getElementById('speed-val').innerText = currentPlaybackRate + "x";
        }

        function toggleFullScreen() {
            const container = document.querySelector('.video-container');
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        }

        function closePlayer() {
            document.getElementById('player-screen').style.display = 'none';
            player.stopVideo();
        }

        function sortVideos() { videoData.reverse(); renderList(); }

        window.onload = renderList;
    </script>
</body>
</html>
