<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guru Siyag - v1.1</title>
    <!-- Google Fonts: Poppins for English, Mukta for Hindi -->
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff6b00;
            --primary-dark: #e65a00;
            --bg: #0f0f0f;
            --card: #1c1c1e;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.08);
            --shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mukta', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 0px; }

        /* --- Header --- */
        header {
            position: fixed; top: 0; width: 100%; height: 65px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; border-bottom: 1px solid var(--glass);
        }
        .app-title { font-size: 1.3rem; font-weight: 700; color: var(--primary); letter-spacing: 1px; }
        .header-btns { display: flex; gap: 20px; align-items: center; }
        .header-btns i { font-size: 1.4rem; color: var(--text-dim); cursor: pointer; transition: 0.2s; }
        .header-btns i:active { color: var(--primary); transform: scale(0.9); }

        /* --- Tabs --- */
        .tabs-container { margin-top: 75px; padding: 10px 15px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
        .tab { 
            padding: 7px 20px; background: var(--card); border-radius: 50px; 
            font-size: 0.95rem; border: 1px solid var(--glass); transition: 0.3s;
        }
        .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 10px rgba(255, 107, 0, 0.3); }

        /* --- Video Cards --- */
        #video-list { padding: 15px; padding-bottom: 100px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .v-card {
            display: flex; background: var(--card); border-radius: 16px; margin-bottom: 16px;
            padding: 10px; gap: 12px; border: 1px solid var(--glass); box-shadow: var(--shadow);
            transition: 0.3s; cursor: pointer; position: relative;
        }
        .v-card:active { transform: scale(0.97); background: #252527; }

        .v-thumb { 
            width: 125px; height: 80px; border-radius: 10px; overflow: hidden; 
            flex-shrink: 0; position: relative; background: #2a2a2a;
        }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .v-thumb::after {
            content: '\f04b'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 107, 0, 0.8); width: 30px; height: 30px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: white;
        }

        .v-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .v-info h3 { font-size: 1rem; margin-bottom: 6px; line-height: 1.3; font-weight: 600; color: #f0f0f0; }
        .v-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.75rem; color: var(--text-dim); }
        .v-meta span { display: flex; align-items: center; gap: 5px; }

        /* --- Sidebar & Admin --- */
        #sidebar {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: #18181a; z-index: 2001; transition: 0.4s cubic-bezier(0.1, 0.7, 1, 0.1);
            padding: 30px 20px; border-left: 1px solid var(--glass);
        }
        #sidebar.active { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; gap: 15px; background: var(--glass); transition: 0.2s; }
        .menu-item:active { background: var(--primary); }
        
        .admin-form { display: none; margin-top: 20px; animation: slideIn 0.3s; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .admin-form input { 
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px;
            border: 1px solid var(--glass); background: #252527; color: white; font-size: 0.9rem;
        }
        .save-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #28a745; color: white; font-weight: 600; }

        /* --- Player View --- */
        #player-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 3000; display: none; flex-direction: column;
            animation: fullOpen 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fullOpen { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .player-header { height: 60px; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; box-shadow: var(--shadow); }
        .player-details { padding: 25px 20px; flex-grow: 1; }
        .player-details h2 { font-size: 1.2rem; margin-bottom: 10px; color: var(--primary); }
        .back-nav-btn { 
            margin: 20px; padding: 15px; background: var(--primary); border-radius: 15px;
            text-align: center; font-weight: 700; color: white; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.4);
        }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; }

    </style>
</head>
<body>

    <div class="overlay" onclick="toggleMenu()"></div>

    <header>
        <div class="app-title">GURU SIYAG</div>
        <div class="header-btns">
            <i class="fas fa-arrow-down-9-1" onclick="sortVideos()" title="Sort Newest"></i>
            <i class="fas fa-bars" onclick="toggleMenu()"></i>
        </div>
    </header>

    <div class="tabs-container">
        <div class="tab active">प्रवचन</div>
        <div class="tab">e-Books</div>
        <div class="tab">Coming Soon</div>
    </div>

    <div id="video-list">
        <!-- Videos will load here -->
    </div>

    <!-- Sidebar Menu -->
    <aside id="sidebar">
        <h2 style="color: var(--primary); margin-bottom: 25px; border-bottom: 1px solid var(--glass); padding-bottom: 10px;">Options</h2>
        <div class="menu-item"><i class="fas fa-file-pdf"></i> e-Book (PDF)</div>
        <div class="menu-item" onclick="showAdmin()"><i class="fas fa-video-slash"></i> Add New Video</div>
        
        <div class="admin-form" id="admin-form">
            <input type="text" id="v-url" placeholder="YouTube Link Copy-Paste Karein">
            <input type="text" id="v-title" placeholder="प्रवचन का नाम (Title)">
            <input type="text" id="v-date" placeholder="तारीख (e.g. 20 June 2005)">
            <input type="text" id="v-loc" placeholder="जगह (e.g. Jodhpur, Rajasthan)">
            <button class="save-btn" onclick="addVideo()">Add to Collection</button>
        </div>
    </aside>

    <!-- Video Player Screen -->
    <div id="player-screen">
        <div class="player-header">
            <i class="fas fa-chevron-left" onclick="closePlayer()" style="font-size: 1.3rem;"></i>
            <span style="font-weight: 600;">Guru Siyag Speech</span>
        </div>
        <div class="video-box" id="yt-frame"></div>
        <div class="player-details">
            <h2 id="p-title">Title Here</h2>
            <div class="v-meta">
                <span id="p-date"><i class="far fa-calendar-alt"></i> Date</span>
                <span id="p-loc"><i class="fas fa-map-marker-alt"></i> Location</span>
            </div>
            <div style="margin-top: 20px; font-size: 0.9rem; color: var(--text-dim); line-height: 1.5;">
                जय श्री गुरुदेव! यह वीडियो केवल आध्यात्मिक मार्गदर्शन के लिए है। अभ्यास के लिए गुरुदेव के निर्देशों का पालन करें।
            </div>
        </div>
        <div class="back-nav-btn" onclick="closePlayer()">BACK TO LIST</div>
    </div>

    <script>
        let videoData = JSON.parse(localStorage.getItem('guru_siyag_vids')) || [];

        function toggleMenu() {
            const side = document.getElementById('sidebar');
            const over = document.querySelector('.overlay');
            side.classList.toggle('active');
            over.style.display = side.classList.contains('active') ? 'block' : 'none';
        }

        function showAdmin() {
            const form = document.getElementById('admin-form');
            form.style.display = (form.style.display === 'block') ? 'none' : 'block';
        }

        function extractID(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            return (match && match[1]) ? match[1] : null;
        }

        function addVideo() {
            const url = document.getElementById('v-url').value;
            const title = document.getElementById('v-title').value;
            const date = document.getElementById('v-date').value;
            const loc = document.getElementById('v-loc').value;
            const id = extractID(url);

            if(!id || !title) return alert("Bhai ji, sahi link aur title bhariye!");

            const newVid = { id, title, date, loc, addedOn: Date.now() };
            videoData.unshift(newVid);
            localStorage.setItem('guru_siyag_vids', JSON.stringify(videoData));
            
            // UI Update
            document.querySelectorAll('.admin-form input').forEach(i => i.value = '');
            toggleMenu();
            renderList();
        }

        function renderList() {
            const list = document.getElementById('video-list');
            if(videoData.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding-top:100px; color:#555;">
                    <i class="fas fa-clapperboard" style="font-size:3rem; margin-bottom:10px;"></i>
                    <p>Abhi tak koi video nahi hai.<br>Menu se Add Video karein.</p>
                </div>`;
                return;
            }

            list.innerHTML = videoData.map((v, i) => `
                <div class="v-card" onclick="openVideo(${i})">
                    <div class="v-thumb">
                        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="thumb">
                    </div>
                    <div class="v-info">
                        <h3>${v.title}</h3>
                        <div class="v-meta">
                            <span><i class="far fa-calendar-alt"></i> ${v.date || 'Unknown'}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${v.loc || 'India'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openVideo(index) {
            const v = videoData[index];
            document.getElementById('p-title').innerText = v.title;
            document.getElementById('p-date').innerHTML = `<i class="far fa-calendar-alt"></i> ${v.date}`;
            document.getElementById('p-loc').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${v.loc}`;
            
            // Smooth Youtube Embed
            const frame = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0" 
                           frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('yt-frame').innerHTML = frame;
            document.getElementById('player-screen').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('player-screen').style.display = 'none';
            document.getElementById('yt-frame').innerHTML = '';
        }

        function sortVideos() {
            videoData.reverse(); // Simple toggle sort for now
            renderList();
        }

        // Initial Start
        renderList();
    </script>
</body>
</html>
